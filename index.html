<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消費者 vs 生産者 思考診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #dddbd4;
    --consumer: #e0334c;
    --producer: #0891b2;
    --gold: #d97706;
    --text: #1a1a1a;
    --text-sub: #4a4a4a;
    --muted: #888880;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .app { max-width: 640px; margin: 0 auto; padding: 32px 20px 80px; }

  .header { text-align: center; margin-bottom: 28px; padding: 36px 24px 32px; background: var(--surface); border-radius: 16px; box-shadow: var(--shadow); }
  .tag { display: inline-block; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--producer); background: rgba(8,145,178,0.1); padding: 5px 14px; border-radius: 100px; margin-bottom: 16px; font-weight: 700; }
  .title { font-family: 'Noto Serif JP', serif; font-size: clamp(24px, 6vw, 38px); font-weight: 900; line-height: 1.3; margin-bottom: 12px; }
  .title .accent-c { color: var(--consumer); }
  .title .accent-p { color: var(--producer); }
  .subtitle { font-size: 14px; color: var(--text-sub); line-height: 1.8; }
  .subtitle small { display: block; margin-top: 6px; font-size: 12px; color: var(--muted); }

  .dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 18px; padding: 12px 0 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .dot.answered { background: var(--producer); }
  .dot.current { background: var(--gold); width: 22px; border-radius: 4px; }

  .progress-wrap { margin-bottom: 20px; background: var(--surface); border-radius: 12px; padding: 16px 20px; box-shadow: var(--shadow); }
  .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-text { font-size: 14px; font-weight: 700; color: var(--text); }
  .progress-pct { font-size: 13px; font-weight: 700; color: var(--producer); }
  .progress-bar { height: 6px; background: #e8e6df; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--consumer), var(--producer)); border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

  .question-card { background: #fff; border-radius: 16px; padding: 28px 28px 24px; margin-bottom: 16px; box-shadow: var(--shadow-lg); border-top: 4px solid; border-image: linear-gradient(90deg, var(--consumer), var(--producer)) 1; animation: slideIn 0.35s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .question-num { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; color: var(--producer); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .question-num .line { flex: 1; height: 1px; background: var(--border); }
  .question-text { font-family: 'Noto Serif JP', serif; font-size: clamp(16px, 3.8vw, 20px); font-weight: 700; line-height: 1.7; color: var(--text); }

  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .option-btn { background: #fff; border: 2px solid var(--border); border-radius: 12px; padding: 18px 20px; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: flex-start; gap: 14px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.7; box-shadow: var(--shadow); }
  .option-btn:hover { border-color: var(--producer); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(8,145,178,0.15); }
  .option-btn.selected-a { border-color: var(--consumer); background: rgba(224,51,76,0.05); box-shadow: 0 4px 16px rgba(224,51,76,0.15); }
  .option-btn.selected-b { border-color: var(--producer); background: rgba(8,145,178,0.05); box-shadow: 0 4px 16px rgba(8,145,178,0.15); }
  .option-letter { width: 32px; height: 32px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; transition: all 0.2s; color: var(--muted); }
  .option-btn.selected-a .option-letter { background: var(--consumer); border-color: var(--consumer); color: #fff; }
  .option-btn.selected-b .option-letter { background: var(--producer); border-color: var(--producer); color: #fff; }
  .option-text { flex: 1; }

  .nav-row { display: flex; gap: 12px; }
  .btn { padding: 16px 20px; border: none; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; transition: all 0.2s; border-radius: 12px; flex: 1; }
  .btn-ghost { background: #fff; border: 2px solid var(--border); color: var(--text-sub); box-shadow: var(--shadow); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
  .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary { background: var(--producer); color: #fff; box-shadow: 0 4px 16px rgba(8,145,178,0.35); flex: 2; }
  .btn-primary:hover:not(:disabled) { background: #0779a0; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(8,145,178,0.4); }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* RESULT */
  .result-screen { display: none; }
  .result-screen.show { display: block; animation: slideIn 0.45s ease; }
  .score-hero { background: #fff; border-radius: 20px; text-align: center; padding: 44px 24px 36px; margin-bottom: 16px; box-shadow: var(--shadow-lg); }
  .score-label { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .score-number { font-family: 'Noto Serif JP', serif; font-size: clamp(80px, 18vw, 120px); font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .score-number.type-producer { color: var(--producer); }
  .score-number.type-mixed    { color: var(--gold); }
  .score-number.type-consumer { color: var(--consumer); }
  .score-max { font-size: 15px; color: var(--muted); margin-bottom: 20px; font-weight: 500; }
  .type-badge { display: inline-block; padding: 10px 28px; font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 700; border-radius: 100px; }
  .type-consumer { background: rgba(224,51,76,0.1); color: var(--consumer); border: 2px solid rgba(224,51,76,0.3); }
  .type-mixed    { background: rgba(217,119,6,0.1);  color: var(--gold);     border: 2px solid rgba(217,119,6,0.3); }
  .type-producer { background: rgba(8,145,178,0.1);  color: var(--producer); border: 2px solid rgba(8,145,178,0.3); }

  .gauge-wrap { background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .gauge-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; color: var(--text-sub); margin-bottom: 12px; }
  .gauge-track { height: 10px; background: #e8e6df; border-radius: 5px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--consumer), var(--gold), var(--producer)); transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }

  .breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .breakdown-card { background: #fff; border-radius: 14px; padding: 22px 16px; text-align: center; box-shadow: var(--shadow); border-top: 3px solid transparent; }
  .breakdown-card.c-side { border-top-color: var(--consumer); }
  .breakdown-card.p-side { border-top-color: var(--producer); }
  .breakdown-num { font-family: 'Noto Serif JP', serif; font-size: 44px; font-weight: 900; line-height: 1; margin-bottom: 8px; }
  .c-side .breakdown-num { color: var(--consumer); }
  .p-side .breakdown-num { color: var(--producer); }
  .breakdown-label { font-size: 12px; color: var(--text-sub); font-weight: 500; line-height: 1.5; }

  .result-detail { background: #fff; border-radius: 14px; padding: 26px 24px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .result-detail h3 { font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 700; margin-bottom: 12px; color: var(--text); line-height: 1.5; }
  .result-detail p { font-size: 15px; color: var(--text-sub); line-height: 1.9; }

  .retry-btn { width: 100%; padding: 18px; background: #fff; border: 2px solid var(--border); color: var(--text-sub); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; border-radius: 12px; transition: all 0.2s; margin-top: 4px; box-shadow: var(--shadow); }
  .retry-btn:hover { border-color: var(--producer); color: var(--producer); transform: translateY(-2px); }
</style>
</head>
<body>
<div class="app">
  <div id="quiz-section">
    <div class="header">
      <div class="tag">Mindset Diagnostic</div>
      <h1 class="title"><span class="accent-c">消費者</span> or <span class="accent-p">生産者</span><br>思考診断</h1>
      <p class="subtitle">10の質問に直感で答えるだけ<br>あなたの思考パターンを10点満点で分析します<small>200問からランダム出題 — 毎回違う設問で診断できます</small></p>
    </div>
    <div class="dots" id="dots"></div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-text" id="progress-text">Q1 / 10</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="question-card" id="question-card">
      <div class="question-num" id="question-num">Q01 <span class="line"></span></div>
      <div class="question-text" id="question-text"></div>
    </div>
    <div class="options" id="options"></div>
    <div class="nav-row">
      <button class="btn btn-ghost" id="prev-btn" onclick="prevQuestion()">← 戻る</button>
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>次の質問へ →</button>
    </div>
  </div>

  <div class="result-screen" id="result-section">
    <div class="score-hero">
      <div class="score-label">Your Producer Score</div>
      <div class="score-number" id="score-num">0</div>
      <div class="score-max">点 / 10点満点</div>
      <div class="type-badge" id="type-badge"></div>
    </div>
    <div class="gauge-wrap">
      <div class="gauge-labels"><span>🛒 消費者思考</span><span>⚡ 生産者思考</span></div>
      <div class="gauge-track"><div class="gauge-fill" id="gauge-fill" style="width:0%"></div></div>
    </div>
    <div class="breakdown">
      <div class="breakdown-card c-side"><div class="breakdown-num" id="c-count">0</div><div class="breakdown-label">消費者思考<br>の回答数</div></div>
      <div class="breakdown-card p-side"><div class="breakdown-num" id="p-count">0</div><div class="breakdown-label">生産者思考<br>の回答数</div></div>
    </div>
    <div class="result-detail"><h3 id="result-title"></h3><p id="result-desc"></p></div>
    <div class="result-detail"><h3>📌 あなたへのメッセージ</h3><p id="result-advice"></p></div>
    <button class="retry-btn" onclick="resetQuiz()">↺ もう一度診断する（新しい10問）</button>
  </div>
</div>

<script>
// ============================================================
// 200問データベース（A=消費者思考 / B=生産者思考）
// ============================================================
const ALL_QUESTIONS = [
  // --- 日常・体験 ---
  { text:"休日に新しいカフェを見つけたとき、まず何を考えますか？", a:"雰囲気いい！次は誰と来ようかな。インスタに投稿しよっと。", b:"この内装のコンセプト、どうやって集客してるんだろう。自分のビジネスに活かせるかも。" },
  { text:"おいしいランチを食べたとき、真っ先にすることは？", a:"写真を撮ってSNSに投稿する。", b:"なぜこの味になるのか、再現できないか考える。" },
  { text:"旅行先で感動する景色に出会ったとき、あなたは？", a:"できるだけ多く写真を撮り、思い出として残す。", b:"この場所をどうすれば多くの人に届けられるか考える。" },
  { text:"映画を観て感動した後、最初にすることは？", a:"友人におすすめを伝える。", b:"なぜ感動したのか構造を分析し、自分のコンテンツに活かす。" },
  { text:"美容室でいいヘアスタイルになったとき？", a:"鏡を見て満足し、次の予約を入れる。", b:"どんな技術・提案が良かったのか、自分の仕事のヒントを探す。" },
  { text:"読んだ本がすごく良かったとき、あなたは？", a:"誰かにおすすめするか、次に読む本を探す。", b:"内容を自分の言葉でまとめ、発信するネタにする。" },
  { text:"好きなブランドの新商品が出たとき？", a:"すぐに購入を検討する。", b:"どんな戦略でこの商品を出したのか考察する。" },
  { text:"ジムやヨガで体が変わってきたと感じたとき？", a:"もっと続けてキープしたいと思う。", b:"このプログラムを他の人にも伝えたい・教えたいと思う。" },
  { text:"気に入ったポッドキャストを聴いたとき？", a:"ながら聴きしながら次のエピソードを楽しむ。", b:"どんな構成・話し方が響いたか分析する。" },
  { text:"すごく居心地いいホテルに泊まったとき？", a:"また来たいな、と思う。", b:"この体験をどう自分のサービスに応用できるか考える。" },

  // --- お金・収入 ---
  { text:"欲しいものがあるけどお金が足りない。あなたの行動は？", a:"節約してお金を貯めるか、後回しにする。", b:"そのお金を稼げる方法・売れるものを考え始める。" },
  { text:"給料日前に残高が少ないと気づいたとき？", a:"今月は節約しよう、と支出を減らす方向で考える。", b:"今すぐ稼げることは何か、を先に考える。" },
  { text:"副業について考えたとき、最初に浮かぶのは？", a:"何か楽で稼げるものはないかな、と探す。", b:"自分が持つスキルや知識で誰かの役に立てないか考える。" },
  { text:"お金の使い方として正しいと思うのは？", a:"今を楽しむための消費にお金を使う。", b:"将来の収入を生むための投資にお金を使う。" },
  { text:"誰かが高収入を得ていると聞いたとき？", a:"羨ましいな、と思う。", b:"どんな仕組みで稼いでいるのか分析したくなる。" },
  { text:"クレジットカードのポイントが貯まったとき？", a:"お得に買い物に使う。", b:"このポイント経済圏の仕組みを考えてみる。" },
  { text:"宝くじや懸賞に当たったら何をする？", a:"欲しかったものを買う・旅行に行く。", b:"事業やスキルアップへの投資に使う。" },
  { text:"投資について聞かれたら？", a:"怖い・難しいのでとりあえず貯金している。", b:"自己投資・事業投資を優先しながら資産形成も考える。" },
  { text:"「お金は働かせるもの」という言葉を聞いて？", a:"そうは言っても難しい、と感じる。", b:"自分のビジネスや仕組みをどう作るか考えるきっかけになる。" },
  { text:"フリマアプリを見たとき？", a:"安く買えるものを探す。", b:"何が売れているか・どう価格をつけるか観察する。" },

  // --- ビジネス・仕事 ---
  { text:"SNSで誰かのビジネスが「うまくいってる」のを見たとき？", a:"いいな〜。自分にはそんな才能ないし。", b:"どんな仕組みで回してるんだろう？参考にしてみよう。" },
  { text:"誰かに「これ、どうしたらいいですか？」と相談されたとき？", a:"わからないし、自分の意見を言うのは責任が重い。", b:"知ってることは全部伝える。教えることで自分も整理される。" },
  { text:"仕事でミスをしてしまったとき？", a:"落ち込んで、しばらく引きずる。", b:"原因を分析して、仕組みで防ぐ方法を考える。" },
  { text:"「起業したい」と言われたとき？", a:"リスクがあるから慎重に、とアドバイスする。", b:"まず小さくスタートする方法を一緒に考える。" },
  { text:"仕事の効率化ツールを見つけたとき？", a:"便利！使ってみたい、と思う。", b:"これを使ってどんな価値が生み出せるか考える。" },
  { text:"会議で新しいアイデアが必要になったとき？", a:"他の人の意見をまとめて整理する。", b:"自分から積極的にアイデアを出す。" },
  { text:"スキルアップのためにセミナーに行くとき？", a:"良い話が聞けたら満足する。", b:"学んだことをすぐに誰かに教えるか、仕事に応用する。" },
  { text:"新しいプロジェクトを任されたとき？", a:"指示に従って進める。", b:"自分でゴールから逆算してプランを立てる。" },
  { text:"競合他社の商品やサービスを見たとき？", a:"へー、こんなのあるんだ、と思う。", b:"差別化ポイントと自分の強みを比較する。" },
  { text:"クレームや批判を受けたとき？", a:"落ち込んで、できれば避けたいと思う。", b:"改善のヒントとして受け止め、すぐに対処策を考える。" },

  // --- 学び・インプット ---
  { text:"好きなジャンルの本・コンテンツを大量に消費している自分に気づいた。", a:"もっと良いコンテンツを探す。インプットが大事だから。", b:"いい加減、自分でも何かアウトプットしなければと感じる。" },
  { text:"勉強会やセミナーに参加するとき、目的は？", a:"良い話を聞いてモチベーションを上げたい。", b:"即使えるネタを持ち帰り、すぐ実践する。" },
  { text:"YouTubeで学習動画を観るとき？", a:"気になるものを次々と再生する。", b:"1本観たら必ず何か行動に移す。" },
  { text:"資格を取ることについて考えたとき？", a:"資格があれば自信がつくし、安心できる。", b:"資格より実績と経験の方が大事だと思う。" },
  { text:"読んだ本の内容を忘れてしまったとき？", a:"仕方ない、また読もうと思う。", b:"アウトプットしていなかったからだ、と反省する。" },
  { text:"「学ぶ」ことの目的は？", a:"知識を増やして、教養を深めること。", b:"行動を変えて、結果を変えること。" },
  { text:"オンライン講座を購入したとき？", a:"良い講座が見つかった！と満足する。", b:"すぐに受講して、どう使うか計画を立てる。" },
  { text:"新しい言語やスキルを学ぶとき？", a:"楽しいからとりあえず続ける。", b:"何のために使うか目的を先に決める。" },
  { text:"知らないことを聞かれたとき？", a:"「わからない」と答えてその場を終わらせる。", b:"「すぐ調べます」と言って学ぶきっかけにする。" },
  { text:"情報収集に使う時間について？", a:"もっと多くの情報をインプットしたい。", b:"インプットよりアウトプットの時間を増やしたい。" },

  // --- 時間・習慣 ---
  { text:"あなたにとって「時間」の感覚に近いのは？", a:"時間は有限。上手に使って楽しみたい。", b:"時間は資産。何かを生み出すために投資するもの。" },
  { text:"朝起きて最初にすることは？", a:"スマホを開いてSNSやニュースをチェックする。", b:"今日やることを確認し、最重要タスクから始める。" },
  { text:"スキマ時間ができたとき？", a:"SNSを見たり動画を観て休憩する。", b:"アイデアを書き留めたり、小さな仕事を進める。" },
  { text:"休日の過ごし方は？", a:"好きなことをして思いっきりリフレッシュする。", b:"平日できないことを進めつつ、リフレッシュもする。" },
  { text:"「忙しい」と感じたとき？", a:"やることが多すぎて大変だ、と感じる。", b:"何を捨てて何に集中すべきか整理する。" },
  { text:"1日の終わりに振り返ること？", a:"今日も疲れた、ゆっくり休もう。", b:"今日の成果と明日の優先順位を確認する。" },
  { text:"習慣化について考えるとき？", a:"続けるのは難しい、意志が弱いから。", b:"仕組みと環境で続けられるように設計する。" },

// ============================================================
// ランダムに10問選ぶ
// ============================================================
function pickRandom(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

const results = {
  producer: {
    label: "⚡ 生産者思考タイプ",
    cls: "type-producer",
    title: "⚡ あなたは「価値を創る人」の思考を持っています",
    desc: "世界を「受け取る側」ではなく「提供する側」として見ています。日常の体験も、他者の成功も、自分の不満も——すべてをビジネスや創造の種として捉える視点が自然と備わっています。この思考を持つ人は、時代の変化を怖れるのではなく、変化の中にチャンスを見出します。",
    advice: "あなたはすでに「作る側」の回路が動いています。あとは行動量と継続性だけです。完璧を求めず、まず小さくリリースすること。美容師・ライター・講師——どの役割でも、あなたの思考は最高の武器になります。今日、何か一つアウトプットしてみましょう。"
  },
  mixed: {
    label: "✨ バランス思考タイプ",
    cls: "type-mixed",
    title: "✨ 消費と生産のバランスを持つ移行期タイプ",
    desc: "消費者としての豊かな感性と、生産者としての芽生えた視点が共存しています。「いいな」と感じる感覚はすでに十分。あとはその感情を「どうしたら作れるか」「どうしたら届けられるか」という問いに変換するクセをつけるだけです。あなたは今、ちょうどシフトのタイミングにいます。",
    advice: "消費者感性は才能です。「これが好き」という直感は、コンテンツや商品を作る最高のコンパスになります。インプットを続けながら、週1つでいいのでアウトプットする習慣を作りましょう。SNS投稿でも、ノートでも、誰かに教えることでも構いません。"
  },
  consumer: {
    label: "🛒 消費者思考タイプ",
    cls: "type-consumer",
    title: "🛒 あなたは「受け取る側」の思考が強い状態です",
    desc: "今のあなたは、世界を「楽しむ」「受け取る」視点で見ています。それ自体は悪いことではありません。豊かな感性を持ち、良いものを見抜く目がある。しかし「誰かが作ってくれたものを選ぶ」という姿勢が強い状態では、経済的・精神的な自由度は限られてしまいます。",
    advice: "まず「これを自分が作るとしたら？」という問いを日常に持ち込むことから始めましょう。美容室でも、読んだ本でも、食べたご飯でも。消費した体験を「言語化・発信」するだけで、あなたは生産者への第一歩を踏み出せます。思考の習慣を少しずつ変えていきましょう。"
  }
};

let current = 0;
let answers = [];
let sessionQuestions = [];

function init() {
  current = 0;
  answers = new Array(10).fill(null);
  sessionQuestions = pickRandom(ALL_QUESTIONS, 10);

  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' current' : '');
    d.id = 'dot-' + i;
    dotsEl.appendChild(d);
  }
  renderQuestion();
}

function renderQuestion() {
  const q = sessionQuestions[current];
  const numStr = String(current + 1).padStart(2, '0');
  document.getElementById('question-num').innerHTML = 'Q' + numStr + ' <span class="line"></span>';
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('progress-text').textContent = `Q${current + 1} / 10`;
  const pct = Math.round((current / 10) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';

  const aBtn = document.createElement('button');
  aBtn.className = 'option-btn' + (answers[current] === 'a' ? ' selected-a' : '');
  aBtn.innerHTML = `<span class="option-letter">A</span><span class="option-text">${q.a}</span>`;
  aBtn.onclick = () => selectAnswer('a');

  const bBtn = document.createElement('button');
  bBtn.className = 'option-btn' + (answers[current] === 'b' ? ' selected-b' : '');
  bBtn.innerHTML = `<span class="option-letter">B</span><span class="option-text">${q.b}</span>`;
  bBtn.onclick = () => selectAnswer('b');

  optionsEl.appendChild(aBtn);
  optionsEl.appendChild(bBtn);

  document.getElementById('next-btn').disabled = answers[current] === null;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').textContent = current === 9 ? '結果を見る ✦' : '次の質問へ →';

  for (let i = 0; i < 10; i++) {
    const d = document.getElementById('dot-' + i);
    d.className = 'dot';
    if (i < current) d.classList.add('answered');
    else if (i === current) d.classList.add('current');
  }

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn 0.35s ease';
}

function selectAnswer(choice) {
  answers[current] = choice;
  renderQuestion();
}

function nextQuestion() {
  if (answers[current] === null) return;
  if (current === 9) { showResult(); return; }
  current++;
  renderQuestion();
}

function prevQuestion() {
  if (current === 0) return;
  current--;
  renderQuestion();
}

function showResult() {
  const producerCount = answers.filter(a => a === 'b').length;
  const consumerCount = 10 - producerCount;
  const score = producerCount;

  document.getElementById('quiz-section').style.display = 'none';
  const rs = document.getElementById('result-section');
  rs.classList.add('show');
  window.scrollTo(0, 0);

  const scoreEl = document.getElementById('score-num');
  scoreEl.textContent = score;

  let type;
  if (score >= 7) type = 'producer';
  else if (score >= 4) type = 'mixed';
  else type = 'consumer';

  scoreEl.className = 'score-number ' + results[type].cls;
  document.getElementById('c-count').textContent = consumerCount;
  document.getElementById('p-count').textContent = producerCount;

  setTimeout(() => {
    document.getElementById('gauge-fill').style.width = (score * 10) + '%';
  }, 100);

  const r = results[type];
  const badge = document.getElementById('type-badge');
  badge.textContent = r.label;
  badge.className = 'type-badge ' + r.cls;

  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-desc').textContent = r.desc;
  document.getElementById('result-advice').textContent = r.advice;
}

function resetQuiz() {
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('gauge-fill').style.width = '0%';
  window.scrollTo(0, 0);
  init();
}

init();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;font-family:'Noto Sans JP',sans-serif;color:#2d2d2d;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 60px}

/* Header */
.header{text-align:center;padding:40px 0 32px}
.header-badge{display:inline-block;background:linear-gradient(135deg,#e0334c,#0891b2);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;padding:6px 16px;border-radius:20px;margin-bottom:16px}
.header h1{font-family:'Noto Serif JP',serif;font-size:clamp(22px,5vw,32px);font-weight:700;line-height:1.4;color:#1a1a2e;margin-bottom:12px}
.header p{font-size:14px;color:#666;line-height:1.7}

/* Progress */
.progress-wrap{background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label{font-size:13px;color:#888}
.progress-num{font-size:18px;font-weight:700;color:#0891b2}
.progress-bar{height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#0891b2,#06b6d4);border-radius:4px;transition:width .4s ease}

/* Question Card */
.q-card{background:#fff;border-radius:20px;padding:28px 24px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.q-cat{display:inline-block;background:#f0f9ff;color:#0891b2;font-size:11px;font-weight:700;padding:4px 12px;border-radius:12px;margin-bottom:14px;letter-spacing:1px}
.q-text{font-family:'Noto Serif JP',serif;font-size:clamp(16px,3.5vw,20px);font-weight:700;line-height:1.6;color:#1a1a2e;margin-bottom:24px}

/* Choices */
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;border:2px solid #e8e8e8;border-radius:14px;background:#fafafa;cursor:pointer;transition:all .2s;text-align:left;font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.5;color:#2d2d2d;width:100%}
.choice-btn:hover{border-color:#0891b2;background:#f0f9ff;transform:translateX(4px)}
.choice-btn.selected{border-color:#0891b2;background:#e0f2fe;color:#0c4a6e}
.choice-label{min-width:28px;height:28px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;transition:all .2s}
.choice-btn.selected .choice-label{background:#0891b2;color:#fff}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:8px}
.btn-prev{padding:12px 24px;border:2px solid #ccc;border-radius:12px;background:#fff;color:#888;cursor:pointer;font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:700;transition:all .2s}
.btn-prev:hover{border-color:#888;color:#444}
.btn-next{flex:1;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff;cursor:pointer;font-size:16px;font-family:'Noto Sans JP',sans-serif;font-weight:700;transition:all .2s;box-shadow:0 4px 12px rgba(8,145,178,.3)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(8,145,178,.4)}
.btn-next:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}

/* Start Screen */
.start-screen{text-align:center;padding:20px 0}
.start-card{background:#fff;border-radius:24px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,.08);margin-bottom:24px}
.start-icon{font-size:56px;margin-bottom:20px}
.start-card h2{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#1a1a2e;margin-bottom:16px;line-height:1.4}
.start-card p{font-size:14px;color:#666;line-height:1.8;margin-bottom:8px}
.start-meta{display:flex;justify-content:center;gap:20px;margin:24px 0;flex-wrap:wrap}

</div>

<!-- Result Screen -->

let selected = [];
let answers = [];
let current = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  selected = shuffle(ALL_QUESTIONS).slice(0, 10);
  answers = new Array(10).fill(null);
  current = 0;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  renderQ();
}

function renderQ() {
  const q = selected[current];
  document.getElementById('progressNum').textContent = (current + 1) + ' / 10';
  document.getElementById('progressFill').style.width = ((current + 1) / 10 * 100) + '%';
  document.getElementById('qCat').textContent = q.cat;
  document.getElementById('qText').textContent = q.q;

  const opts = [
    {key:'a', score:0, text:q.a},
    {key:'b', score:1, text:q.b},
    {key:'c', score:2, text:q.c},
    {key:'d', score:3, text:q.d},
  ];

  const container = document.getElementById('choices');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (answers[current] === opt.score ? ' selected' : '');
    btn.innerHTML = '<span class="choice-label">' + opt.key.toUpperCase() + '</span><span>' + opt.text + '</span>';
    btn.onclick = () => selectAnswer(opt.score);
    container.appendChild(btn);
  });

  document.getElementById('btnPrev').style.visibility = current === 0 ? 'hidden' : 'visible';
  const btnNext = document.getElementById('btnNext');
  btnNext.disabled = answers[current] === null;
  btnNext.textContent = current === 9 ? '結果を見る ✨' : '次へ →';
}

function selectAnswer(score) {
  answers[current] = score;
  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === score);
  });
  document.getElementById('btnNext').disabled = false;
}

function nextQ() {
  if (answers[current] === null) return;
  if (current === 9) { showResult(); return; }
  current++;
  renderQ();
}

function prevQ() {
  if (current === 0) return;
  current--;
  renderQ();
}

function showResult() {
  const total = answers.reduce((s, v) => s + v, 0);
  const max = 30;
  const pct = Math.round(total / max * 100);

  const countA = answers.filter(v => v === 0).length;
  const countB = answers.filter(v => v === 1).length;
  const countC = answers.filter(v => v === 2).length;
  const countD = answers.filter(v => v === 3).length;

  let typeClass, typeBadge, typeTitle, typeEmoji, typeDesc, typeMsg;

  if (total <= 8) {
    typeClass = 'type-consumer';
    typeBadge = '消費者思考タイプ';
    typeTitle = '消費者思考タイプ';
    typeEmoji = '🌱';
    typeDesc = 'あなたは現在、受け取る・楽しむ・消費することが中心の思考パターンです。これは悪いことではありません。まずは自分の価値観や好きなことを知ることから生産者思考への扉が開きます。';
    typeMsg = '小さな一歩が大きな変化を生みます。今日から一つだけ「生み出す」行動をしてみましょう。SNSに学びを投稿する、日記を書く、誰かに何かを教える——それが出発点です。';
  } else if (total <= 15) {
    typeClass = 'type-balance';
    typeBadge = 'バランス思考タイプ';
    typeTitle = 'バランス思考タイプ';
    typeEmoji = '⚖️';
    typeDesc = '消費と生産のバランスが取れているタイプです。学ぶことや楽しむことと、何かを作ることの間で揺れているかもしれません。あと一歩の意識の転換で大きく変われる段階です。';
    typeMsg = '「インプットしたらアウトプット」を習慣にするだけで一気に変わります。学んだことを誰かに話す、SNSでシェアする——この小さな習慣があなたを生産者に近づけます。';
  } else if (total <= 22) {
    typeClass = 'type-semi';
    typeBadge = '準生産者思考タイプ';
    typeTitle = '準生産者思考タイプ';
    typeEmoji = '🚀';
    typeDesc = '生産者思考がかなり身についています！価値を生み出すことへの意識が高く、自分のビジネスや発信、学びに積極的です。あとは「仕組み化」と「継続」を磨けば、本物の生産者へ進化できます。';
    typeMsg = '次のステップは「自動化」と「レバレッジ」です。自分が動かなくても価値が生まれる仕組みを一つ作ってみましょう。コンテンツ、SNS運用、コミュニティ設計——あなたならできます！';
  } else {
    typeClass = 'type-producer';
    typeBadge = '生産者思考タイプ';
    typeTitle = '生産者思考タイプ';
    typeEmoji = '👑';
    typeDesc = '真の生産者思考の持ち主です！価値を生み出すこと、仕組みを作ること、人に与えることが自然な行動パターンになっています。あなたの思考は周囲に影響を与え、社会を動かす力を持っています。';
    typeMsg = '次のミッションは「再現性を高めること」と「影響範囲を広げること」です。あなたの思考をコンテンツ・講座・書籍・コミュニティとして世界に届けましょう。あなたの存在が誰かの人生を変えます。';
  }

  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');

  document.getElementById('resultContent').className = 'result-screen ' + typeClass;
  document.getElementById('resultContent').innerHTML = `
    <div class="result-header">
      <div class="result-type-badge">${typeBadge}</div>
      <div class="result-title">${typeEmoji} ${typeTitle}</div>
      <div class="result-subtitle">スコア ${total}点 / ${max}点満点（上位 ${pct}%）</div>
    </div>

    <div class="score-card">
      <div class="score-display">${total}</div>
      <div class="score-max">/ ${max}点</div>
      <div class="gauge-wrap">
        <div class="gauge-fill" id="gaugeFill" style="width:0%"></div>
      </div>
      <div class="score-breakdown">
        <div class="breakdown-item"><div class="breakdown-label">A（消費）</div><div class="breakdown-val">${countA}</div></div>
        <div class="breakdown-item"><div class="breakdown-label">B（やや消費）</div><div class="breakdown-val">${countB}</div></div>
        <div class="breakdown-item"><div class="breakdown-label">C（やや生産）</div><div class="breakdown-val">${countC}</div></div>
        <div class="breakdown-item"><div class="breakdown-label">D（生産）</div><div class="breakdown-val">${countD}</div></div>
      </div>
    </div>

    <div class="result-card">
      <h3>📊 あなたの思考パターン</h3>
      <p>${typeDesc}</p>
    </div>

    <div class="result-card">
      <h3>💡 次のアクション</h3>
      <p>${typeMsg}</p>
    </div>

    <button class="btn-retry" onclick="retryQuiz()">🔄 もう一度診断する（別の問題で）</button>
  `;

  setTimeout(() => {
    const gf = document.getElementById('gaugeFill');
    if (gf) gf.style.width = pct + '%';
  }, 100);
}

function retryQuiz() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}
</script>
</body>
</html>
